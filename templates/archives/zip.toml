name = "ZIP"
description = "ZIP archive — local file entries"
extensions = ["zip", "jar", "apk", "docx", "xlsx", "pptx"]
magic = "504B0304"
magic_offset = 0
endian = "little"

[[regions]]
id = "local_entry"
label = "Local File Entry"
color = "#2ECC71"
offset = 0
group = "entry"
description = "One local file entry (header + filename + extra + data)"
repeat = "until_magic"
repeat_until = "504B0102"

[[regions.fields]]
id = "signature"
label = "Signature"
field_type = "bytes"
length = 4
role = "magic"
color = "#2ECC71"
description = "50 4B 03 04 (PK\\x03\\x04)"

[[regions.fields]]
id = "version_needed"
label = "Version Needed"
field_type = "u16_le"
length = 2
role = "version"
color = "#2ECC71"
description = "Minimum version needed to extract"

[[regions.fields]]
id = "flags"
label = "General Flags"
field_type = "u16_le"
length = 2
color = "#2ECC71"
description = "Bit flags (encryption, compression options)"

[regions.fields.bit_flags]
"0" = "Encrypted"
"1" = "Compression Option 1"
"2" = "Compression Option 2"
"3" = "Data Descriptor"
"5" = "Compressed Patched"
"6" = "Strong Encryption"
"11" = "Language Encoding (UTF-8)"
"13" = "Encrypted Central Dir"

[[regions.fields]]
id = "compression"
label = "Compression Method"
field_type = "u16_le"
length = 2
color = "#2ECC71"
description = "0=stored, 8=deflated"

[regions.fields.enum_values]
"0" = "Stored"
"1" = "Shrunk"
"6" = "Imploded"
"8" = "Deflated"
"9" = "Deflate64"
"12" = "BZIP2"
"14" = "LZMA"
"93" = "Zstandard"
"95" = "XZ"

[[regions.fields]]
id = "mod_time"
label = "Last Mod Time"
field_type = "u16_le"
length = 2
color = "#2ECC71"
description = "MS-DOS time format"

[[regions.fields]]
id = "mod_date"
label = "Last Mod Date"
field_type = "u16_le"
length = 2
color = "#2ECC71"
description = "MS-DOS date format"

[[regions.fields]]
id = "crc32"
label = "CRC-32"
field_type = "u32_le"
length = 4
role = "checksum"
color = "#2ECC71"

[[regions.fields]]
id = "compressed_size"
label = "Compressed Size"
field_type = "u32_le"
length = 4
role = "size"
color = "#2ECC71"

[[regions.fields]]
id = "uncompressed_size"
label = "Uncompressed Size"
field_type = "u32_le"
length = 4
role = "size"
color = "#2ECC71"

[[regions.fields]]
id = "filename_length"
label = "Filename Length"
field_type = "u16_le"
length = 2
role = "size"
color = "#2ECC71"

[[regions.fields]]
id = "extra_length"
label = "Extra Field Length"
field_type = "u16_le"
length = 2
role = "size"
color = "#2ECC71"

[[regions.fields]]
id = "filename_data"
label = "Filename"
field_type = "utf8"
length = "from:filename_length"
color = "#3498DB"

[[regions.fields]]
id = "extra_data"
label = "Extra Data"
field_type = "bytes"
length = "from:extra_length"
color = "#9B59B6"

[[regions.fields]]
id = "file_data"
label = "File Data"
field_type = "bytes"
length = "from:compressed_size"
role = "data"
color = "#E67E22"
