name = "Java Class"
description = "Java class file format"
extensions = ["class"]
magic = "CAFEBABE"
magic_offset = 0
endian = "big"

[[regions]]
id = "class_header"
label = "Class File Header"
color = "#E74C3C"
offset = 0
length = 10
group = "header"
description = "Java class file header with magic number, version, and constant pool count"

[[regions.fields]]
id = "magic"
label = "Magic"
field_type = "bytes"
length = 4
role = "magic"
description = "0xCAFEBABE — Java class file magic"

[[regions.fields]]
id = "minor_version"
label = "Minor Version"
field_type = "u16_be"
length = 2
role = "version"
description = "Minor version number"

[[regions.fields]]
id = "major_version"
label = "Major Version"
field_type = "u16_be"
length = 2
role = "version"
description = "Major version number (determines Java SE version)"

[regions.fields.enum_values]
"45" = "JDK 1.1"
"46" = "JDK 1.2"
"47" = "JDK 1.3"
"48" = "JDK 1.4"
"49" = "Java SE 5"
"50" = "Java SE 6"
"51" = "Java SE 7"
"52" = "Java SE 8"
"53" = "Java SE 9"
"54" = "Java SE 10"
"55" = "Java SE 11"
"56" = "Java SE 12"
"57" = "Java SE 13"
"58" = "Java SE 14"
"59" = "Java SE 15"
"60" = "Java SE 16"
"61" = "Java SE 17"
"62" = "Java SE 18"
"63" = "Java SE 19"
"64" = "Java SE 20"
"65" = "Java SE 21"

[[regions.fields]]
id = "constant_pool_count"
label = "Constant Pool Count"
field_type = "u16_be"
length = 2
role = "count"
description = "Number of constant pool entries plus one"
