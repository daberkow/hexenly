name = "FAT16"
description = "FAT16 boot sector (BPB) — DOS/Windows 9x volumes"
extensions = ["img", "vhd", "raw", "dd"]
endian = "little"

[[regions]]
id = "boot_sector"
label = "Boot Sector (BPB)"
color = "#2ECC71"
offset = 0
length = 36
group = "bpb"
description = "BIOS Parameter Block — common FAT12/FAT16 fields"

[[regions.fields]]
id = "jump_boot"
label = "Jump Instruction"
field_type = "bytes"
length = 3
role = "magic"
description = "x86 jump instruction (EB xx 90 or E9 xx xx)"

[[regions.fields]]
id = "oem_name"
label = "OEM Name"
field_type = "ascii"
length = 8
description = "OEM identifier (e.g. 'MSDOS5.0')"

[[regions.fields]]
id = "bytes_per_sector"
label = "Bytes Per Sector"
field_type = "u16_le"
length = 2
role = "size"
description = "Usually 512"

[[regions.fields]]
id = "sectors_per_cluster"
label = "Sectors Per Cluster"
field_type = "u8"
length = 1
description = "Must be a power of 2"

[[regions.fields]]
id = "reserved_sectors"
label = "Reserved Sectors"
field_type = "u16_le"
length = 2
role = "count"
description = "Number of reserved sectors (usually 1 for FAT16)"

[[regions.fields]]
id = "num_fats"
label = "Number of FATs"
field_type = "u8"
length = 1
role = "count"
description = "Usually 2"

[[regions.fields]]
id = "root_entry_count"
label = "Root Entry Count"
field_type = "u16_le"
length = 2
role = "count"
description = "Number of root directory entries (typically 512 for hard disks)"

[[regions.fields]]
id = "total_sectors_16"
label = "Total Sectors (16-bit)"
field_type = "u16_le"
length = 2
role = "size"
description = "Total sectors if volume < 65536 sectors, otherwise 0"

[[regions.fields]]
id = "media_type"
label = "Media Type"
field_type = "u8"
length = 1
description = "0xF8 = fixed disk, 0xF0 = removable"

[regions.fields.enum_values]
"240" = "Removable (3.5\" floppy)"
"248" = "Fixed Disk"

[[regions.fields]]
id = "fat_size_16"
label = "FAT Size (16-bit)"
field_type = "u16_le"
length = 2
role = "size"
description = "Sectors per FAT (non-zero for FAT16)"

[[regions.fields]]
id = "sectors_per_track"
label = "Sectors Per Track"
field_type = "u16_le"
length = 2
description = "Drive geometry — sectors per track"

[[regions.fields]]
id = "num_heads"
label = "Number of Heads"
field_type = "u16_le"
length = 2
description = "Drive geometry — number of heads"

[[regions.fields]]
id = "hidden_sectors"
label = "Hidden Sectors"
field_type = "u32_le"
length = 4
description = "Sectors before this partition"

[[regions.fields]]
id = "total_sectors_32"
label = "Total Sectors (32-bit)"
field_type = "u32_le"
length = 4
role = "size"
description = "Total sectors if total_sectors_16 is 0"

[[regions]]
id = "boot_ext"
label = "Extended Boot Record"
color = "#3498DB"
offset = 36
length = 26
group = "bpb"
description = "Extended BIOS Parameter Block — FAT12/FAT16 specific"

[[regions.fields]]
id = "drive_number"
label = "Drive Number"
field_type = "u8"
length = 1
description = "0x00 for floppy, 0x80 for hard disk"

[regions.fields.enum_values]
"0" = "Floppy"
"128" = "Hard Disk"

[[regions.fields]]
id = "reserved_nt"
label = "Reserved (NT)"
field_type = "u8"
length = 1
role = "reserved"
description = "Used by Windows NT, otherwise 0"

[[regions.fields]]
id = "boot_sig"
label = "Boot Signature"
field_type = "u8"
length = 1
description = "0x29 indicates volume serial, label, and FS type are present"

[[regions.fields]]
id = "volume_serial"
label = "Volume Serial Number"
field_type = "u32_le"
length = 4
description = "Random serial number assigned at format time"

[[regions.fields]]
id = "volume_label"
label = "Volume Label"
field_type = "ascii"
length = 11
description = "Volume label (padded with spaces)"

[[regions.fields]]
id = "fs_type"
label = "FS Type"
field_type = "ascii"
length = 8
description = "Informational — typically 'FAT16   ' or 'FAT12   '"

[[regions]]
id = "boot_signature"
label = "Boot Sector Signature"
color = "#E74C3C"
offset = 510
length = 2
group = "bpb"
description = "Valid boot sector marker"

[[regions.fields]]
id = "signature"
label = "Signature"
field_type = "u16_le"
length = 2
role = "magic"
description = "0xAA55 — boot sector signature"
